<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Red Website</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
        }

        header {
            background: #e53935;
            color: white;
            padding: 25px;
        }

        .container {
            padding: 50px 20px;
        }

        h2 {
            color: #333;
            margin-bottom: 15px;
        }

        p {
            color: #555;
            margin-bottom: 25px;
            font-size: 18px;
        }

        button {
            background: #e53935;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #c62828;
        }

        footer {
            background: #222;
            color: white;
            padding: 15px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Website</h1>
    </header>

    <div class="container">
        <h2>Hello, Visitor!</h2>
        <p>This is a simple HTML website with a red theme. somthing is wrong its time to be corrected</p>

        <button onclick="showMessage()">Click Me</button>
    </div>

    <footer>
        <p>&copy; 2026 My Website. All Rights Reserved.</p>
    </footer>

    <script>
        function showMessage() {
            alert("Welcome! Thanks for visiting my website.");
        }
    </script>

</body>
</html>
