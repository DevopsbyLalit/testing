<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
        }

        header {
            background: #007BFF;
            color: white;
            padding: 20px;
        }

        .container {
            padding: 40px;
        }

        button {
            background: #007BFF;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        footer {
            margin-top: 40px;
            background: #222;
            color: white;
            padding: 15px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Website</h1>
    </header>

    <div class="container">
        <h2>Hello!</h2>
        <p>This is a simple HTML website.</p>

        <button onclick="showMessage()">Click Me</button>
    </div>

    <footer>
        <p>&copy; 2026 My Website. All Rights Reserved.</p>
    </footer>

    <script>
        function showMessage() {
            alert("Welcome! Thanks for visiting my website.");
        }
    </script>

</body>
</html>
